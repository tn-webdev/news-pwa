<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TN-News</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="./assets/icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="./assets/icon-120.png">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
 </head>

<body>
  <div class="page-wrapper">
    <h1 class="page-title">Today&#39;s news picks</h1>

    <div class="tag-bar">
        <button class="tag-button is-active" data-tag="all">すべて</button>
        <button class="tag-button" data-tag="AI">AI</button>
        <button class="tag-button" data-tag="経済">経済</button>
        <button class="tag-button" data-tag="その他">その他</button>
    </div>
  
    <div class="event-banner">
    <p id="today-news">今日の最新ニュース</p>
    </div>

    <script>
        const today = new Date();
        const formatted = today.getFullYear() + "年"
                        + (today.getMonth() + 1) + "月"
                        + today.getDate() + "日";

        document.getElementById("today-news").textContent =
            formatted + "の最新ニュースだよ😊🤖\n今日は結婚記念日！😄🎉✨";
    </script>
    
    <div id="news-list"></div>
    <div id="news-container"></div>
    <div id="today-news" style="white-space: pre-line;"></div>
  </div>

<script src="./script_v2.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log('SW OK:', reg))
      .catch(err => console.log('SW NG:', err));
  }
</script>

<footer class="footer">
  <a href="./terms.html">利用規約</a>
</footer>

</body>
</html>
